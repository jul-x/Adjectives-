<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Grammar Game: Participles</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Секция колоды -ED */
        .deck-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: center; width: 320px; }
        .card-ed { width: 150px; height: 210px; background: var(--primary); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; margin: 15px auto; cursor: pointer; transition: transform 0.6s; transform-style: preserve-3d; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card-ed.revealed { background: var(--accent); transform: rotateY(180deg); }
        .card-ed span { transform: rotateY(180deg); }

        /* Секция карт -ING на руках */
        .ing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; max-width: 900px; width: 100%; }
        .card-ing { background: white; border: 2px solid #bdc3c7; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .card-ing:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card-ing.disabled { opacity: 0.3; cursor: default; background: #ddd; }
        
        .status-bar { margin: 20px; font-size: 1.2rem; font-weight: bold; color: var(--primary); height: 1.5em; }
        button#reset { margin-top: 30px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>30 -ing and -ed participles</h2>
    
    <div class="deck-section">
        <p><strong>Click to draw an -ED card</strong></p>
        <div id="edCard" class="card-ed" onclick="drawCard()">DRAW</div>
        <div id="edWordDisplay" style="margin-top: 10px; font-size: 1.5rem; font-weight: bold; color: var(--accent);"></div>
    </div>

    <div class="status-bar" id="statusBar">Draw a card to start!</div>

    <div class="ing-grid" id="ingGrid"></div>

    <button id="reset" onclick="initGame()">Restart Game</button>

    <script>
        const words = [
            {ing: 'interesting', ed: 'interested'}, {ing: 'boring', ed: 'bored'},
            {ing: 'surprising', ed: 'surprised'}, {ing: 'disappointing', ed: 'disappointed'},
            {ing: 'tiring', ed: 'tired'}, {ing: 'exciting', ed: 'excited'},
            {ing: 'fascinating', ed: 'fascinated'}, {ing: 'shocking', ed: 'shocked'},
            {ing: 'frightening', ed: 'frightened'}, {ing: 'disgusting', ed: 'disgusted'},
            {ing: 'annoying', ed: 'annoyed'}, {ing: 'embarrassing', ed: 'embarrassed'},
            {ing: 'worrying', ed: 'worried'}, {ing: 'confusing', ed: 'confused'},
            {ing: 'amusing', ed: 'amused'}, {ing: 'depressing', ed: 'depressed'}
        ];

        let edPile = [];
        let currentEd = null;

        function initGame() {
            edPile = [...words].sort(() => Math.random() - 0.5);
            const ingGrid = document.getElementById('ingGrid');
            ingGrid.innerHTML = '';
            
            // Создаем карточки -ING (из IMG_7850.jpeg)
            words.map(w => w.ing).sort().forEach(word => {
                const div = document.createElement('div');
                div.className = 'card-ing';
                div.innerText = word;
                div.onclick = () => checkMatch(word, div);
                ingGrid.appendChild(div);
            });

            document.getElementById('edCard').innerText = 'DRAW';
            document.getElementById('edCard').classList.remove('revealed');
            document.getElementById('edWordDisplay').innerText = '';
            document.getElementById('statusBar').innerText = 'Draw an -ED card';
            currentEd = null;
        }

        function drawCard() {
            if (currentEd) return; 
            if (edPile.length === 0) {
                alert("Game over! You matched all cards.");
                return;
            }

            const card = edPile.pop();
            currentEd = card;
            
            const cardEl = document.getElementById('edCard');
            cardEl.classList.add('revealed');
            cardEl.innerHTML = `<span>${card.ed}</span>`;
            document.getElementById('statusBar').innerText = "Find the matching -ING card!";
        }

        function checkMatch(selectedIng, element) {
            if (!currentEd) {
                alert("Draw an -ED card first!");
                return;
            }

            if (currentEd.ing === selectedIng) {
                // Успешное совпадение согласно правилам IMG_7851
                document.getElementById('statusBar').innerHTML = `<span style="color:green">Match! Now make a sentence!</span>`;
                element.classList.add('disabled');
                
                // Даем время прочитать и составить предложение
                setTimeout(() => {
                    currentEd = null;
                    const cardEl = document.getElementById('edCard');
                    cardEl.classList.remove('revealed');
                    cardEl.innerText = 'DRAW';
                    document.getElementById('statusBar').innerText = "Draw next card...";
                }, 2500);
            } else {
                document.getElementById('statusBar').innerHTML = `<span style="color:red">Wrong! Try again.</span>`;
            }
        }

        initGame();
    </script>
</body>
</html>
