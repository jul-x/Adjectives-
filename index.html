<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Cards -ing/-ed</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #4a90e2;
            --secondary: #357abd;
            --card-ed: #ffffff;
            --text: #2c3e50;
            --shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        .deck-container {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 40px;
        }

        /* Стиль колоды */
        .main-pile {
            width: 140px;
            height: 190px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: 4px solid white;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 10px 0 #2a5a8e, var(--shadow);
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
        }

        .main-pile:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #2a5a8e, var(--shadow);
        }

        /* Игровое поле */
        .table {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        /* Стиль вытянутой карты */
        .card {
            width: 140px;
            height: 190px;
            background: var(--card-ed);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            animation: drawCard 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: default;
            border: 1px solid rgba(0,0,0,0.05);
        }

        @keyframes drawCard {
            0% { opacity: 0; transform: scale(0.5) translateY(-100px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-word {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .card-type {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
        }

        .remove-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .controls {
            margin-top: auto;
            padding: 40px;
        }

        .btn-reset {
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--primary);
            color: white;
        }

        .empty-msg {
            color: #95a5a6;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h2>Grammar Cards</h2>
        <p>Нажми на колоду, чтобы вытянуть карту (-ed)</p>
    </header>

    <div class="deck-container">
        <div class="main-pile" id="deck" onclick="drawCard()">
            DECK
        </div>
    </div>

    <div class="table" id="table">
        <!-- Сюда будут падать карты -->
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetGame()">Перемешать колоду</button>
    </div>

    <script>
        // Список слов из IMG_7850.jpeg
        const wordList = [
            'interested', 'bored', 'surprised', 'disappointed',
            'tired', 'excited', 'fascinated', 'shocked',
            'frightened', 'disgusted', 'annoyed', 'embarrassed',
            'worried', 'confused', 'amused', 'depressed'
        ];

        let deck = [];

        function shuffleDeck() {
            deck = [...wordList].sort(() => Math.random() - 0.5);
            updateDeckStatus();
        }

        function updateDeckStatus() {
            const deckEl = document.getElementById('deck');
            if (deck.length === 0) {
                deckEl.style.opacity = '0.5';
                deckEl.innerText = 'EMPTY';
            } else {
                deckEl.style.opacity = '1';
                deckEl.innerText = deck.length;
            }
        }

        function drawCard() {
            if (deck.length === 0) {
                alert('Колода пуста! Нажми "Перемешать", чтобы начать заново.');
                return;
            }

            const word = deck.pop();
            const table = document.getElementById('table');
            
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerHTML = `
                <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
                <div class="card-word">${word}</div>
                <div class="card-type">-ed participle</div>
            `;
            
            table.prepend(cardDiv); // Новая карта всегда в начале
            updateDeckStatus();
        }

        function resetGame() {
            document.getElementById('table').innerHTML = '';
            shuffleDeck();
        }

        // Инициализация при загрузке
        shuffleDeck();
    </script>
</body>
</html>
