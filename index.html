<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Grammar Cards</title>
    <style>
        :root {
            --bg-color: #f2f5f8;
            --deck-grad: linear-gradient(145deg, #2c3e50, #1a252f);
            --card-bg: #ffffff;
            --accent-color: #3498db;
            --text-main: #2c3e50;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .deck-area {
            padding: 60px 0 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .deck {
            width: 130px;
            height: 180px;
            background: var(--deck-grad);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            box-shadow: 
                0 1px 0 #111,
                0 2px 0 #111,
                0 3px 0 #111,
                0 4px 0 #111,
                0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .deck:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #111, 0 5px 15px rgba(0,0,0,0.2);
        }

        .deck::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        .table {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 900px;
            padding-bottom: 100px;
        }

        .card {
            width: 140px;
            height: 190px;
            background: var(--card-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
            box-shadow: var(--card-shadow);
            position: relative;
            border: 1px solid rgba(0,0,0,0.03);
            animation: cardAppear 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .word {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: #f0f2f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #99a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #ff4757;
            color: white;
        }

        .footer {
            position: fixed;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .reset-btn {
            pointer-events: auto;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            color: #778;
        }

        .reset-btn:hover {
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="deck-area">
        <div class="deck" id="deck" onclick="drawCard()"></div>
    </div>

    <div class="table" id="table"></div>

    <div class="footer">
        <button class="reset-btn" onclick="resetGame()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
    </div>

    <script>
        const words = [
            'interested', 'bored', 'surprised', 'disappointed',
            'tired', 'excited', 'fascinated', 'shocked',
            'frightened', 'disgusted', 'annoyed', 'embarrassed',
            'worried', 'confused', 'amused', 'depressed'
        ];

        let currentDeck = [];

        function init() {
            currentDeck = [...words].sort(() => Math.random() - 0.5);
            document.getElementById('deck').style.opacity = "1";
            document.getElementById('deck').style.cursor = "pointer";
        }

        function drawCard() {
            if (currentDeck.length === 0) return;

            const word = currentDeck.pop();
            const table = document.getElementById('table');

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="close-btn" onclick="this.parentElement.remove()">✕</div>
                <div class="word">${word}</div>
            `;

            table.prepend(card);

            if (currentDeck.length === 0) {
                document.getElementById('deck').style.opacity = "0.2";
                document.getElementById('deck').style.cursor = "default";
            }
        }

        function resetGame() {
            document.getElementById('table').innerHTML = '';
            init();
        }

        init();
    </script>
</body>
</html>
